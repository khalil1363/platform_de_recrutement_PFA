
spring.application.name=USER

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=000000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# JWT - set JWT_SECRET env var in production (256-bit+ base64 key)
jwt.secret=${JWT_SECRET:K7mN9pQ2xR5vL8wY1zA4bC6dE0fG3hJ5kM8nP1qS4tU7vW0xY3zA6bC9dE2fG5hJ8kM=}
jwt.expiration=86400000

# CORS - comma-separated frontend origins only
cors.allowed-origins=http://localhost:4200,http://localhost:3000

# Optional dev admin seed (disable in production: app.seed-admin=false)
app.seed-admin=true
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:Admin@123456}
app.admin.email=${ADMIN_EMAIL:admin@example.com}

# Eureka Registry

eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Server

server.port=8089

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.auth=DEBUG