<div class="page-header-bar">
  <div>
    <h2>Mes recrutements</h2>
    <p>Créez et publiez des offres d'emploi pour votre zone</p>
  </div>
  <button nz-button nzType="primary" (click)="create()">
    <span nz-icon nzType="plus" nzTheme="outline"></span>
    Nouveau recrutement
  </button>
</div>

<nz-spin [nzSpinning]="loading">
  <nz-table [nzData]="recruitments" nzSize="middle">
    <thead>
      <tr>
        <th>Titre</th>
        <th>Agence</th>
        <th>Zone</th>
        <th>QCM</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of recruitments">
        <td><strong>{{ item.title }}</strong></td>
        <td>{{ item.companyName }}</td>
        <td>{{ item.zoneName }}</td>
        <td>{{ item.qcmTitle || '—' }}</td>
        <td><nz-tag [nzColor]="statusColor(item.status)">{{ item.status }}</nz-tag></td>
        <td class="actions">
          <button nz-button nzSize="small" (click)="edit(item.recruitmentId)">Modifier</button>
          <button
            nz-button
            nzSize="small"
            nzDanger
            nz-popconfirm
            nzPopconfirmTitle="Supprimer ce recrutement et toutes ses candidatures ?"
            (nzOnConfirm)="delete(item)"
          >
            Supprimer
          </button>
        </td>
      </tr>
    </tbody>
  </nz-table>
</nz-spin>
